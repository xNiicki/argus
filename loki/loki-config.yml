# ============================================================================
# Argus — Loki (monolithic, filesystem). Includes the RULER so LogQL alerts
# flow the same path as metric alerts: Loki ruler -> Alertmanager -> narrator.
# ============================================================================
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 30d
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 5000
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# Evaluate LogQL alert rules and forward to Alertmanager (-> narrator).
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rule-tmp
  alertmanager_url: http://alertmanager:9093
  enable_alertmanager_v2: true
  enable_api: true
  ring:
    kvstore:
      store: inmemory
