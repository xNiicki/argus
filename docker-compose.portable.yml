# ============================================================================
# Argus — SELF-CONTAINED stack. Generated by scripts/gen-portable-compose.py.
# DO NOT EDIT BY HAND — edit the source configs and run `make portable`.
#
# Paste-anywhere deploy (Portainer/Dockge/bare host): this single file carries
# every config inline; no sibling folders required.
#
#   1. Provide environment variables (Portainer env UI, an .env file, or -e):
#        ARGUS_SITE, ARGUS_EXTERNAL_URL, NTFY_SERVER, NTFY_TOPIC, NTFY_TOKEN,
#        PEER_NARRATOR_URL, PEER_SITE, and (for Proxmox) PVE_TOKEN_VALUE.
#   2. docker compose -f docker-compose.portable.yml up -d
# ============================================================================
name: argus
x-restart:
  restart: unless-stopped
networks:
  argus:
    driver: bridge
volumes:
  prometheus_data: null
  alertmanager_data: null
  loki_data: null
services:
  prometheus:
    restart: unless-stopped
    image: prom/prometheus:v2.55.1
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=30d
    - --web.enable-lifecycle
    - --enable-feature=expand-external-labels
    - --web.external-url=http://prometheus:9090
    environment:
      ARGUS_SITE: ${ARGUS_SITE:-homelab}
    volumes:
    - prometheus_data:/prometheus
    ports:
    - 9090:9090
    networks:
    - argus
    configs:
    - source: prometheus_alerts_certs_yml
      target: /etc/prometheus/alerts/certs.yml
    - source: prometheus_alerts_network_yml
      target: /etc/prometheus/alerts/network.yml
    - source: prometheus_alerts_proxmox_yml
      target: /etc/prometheus/alerts/proxmox.yml
    - source: prometheus_alerts_resources_yml
      target: /etc/prometheus/alerts/resources.yml
    - source: prometheus_alerts_security_yml
      target: /etc/prometheus/alerts/security.yml
    - source: prometheus_alerts_uptime_yml
      target: /etc/prometheus/alerts/uptime.yml
    - source: prometheus_alerts_watchdog_yml
      target: /etc/prometheus/alerts/watchdog.yml
    - source: prometheus_prometheus_yml
      target: /etc/prometheus/prometheus.yml
    - source: prometheus_targets_blackbox_dns_yml
      target: /etc/prometheus/targets/blackbox-dns.yml
    - source: prometheus_targets_blackbox_http_yml
      target: /etc/prometheus/targets/blackbox-http.yml
    - source: prometheus_targets_blackbox_icmp_yml
      target: /etc/prometheus/targets/blackbox-icmp.yml
    - source: prometheus_targets_blackbox_ssl_yml
      target: /etc/prometheus/targets/blackbox-ssl.yml
    - source: prometheus_targets_blackbox_tcp_yml
      target: /etc/prometheus/targets/blackbox-tcp.yml
    - source: prometheus_targets_cadvisor_yml
      target: /etc/prometheus/targets/cadvisor.yml
    - source: prometheus_targets_nodes_yml
      target: /etc/prometheus/targets/nodes.yml
    - source: prometheus_targets_pve_yml
      target: /etc/prometheus/targets/pve.yml
  alertmanager:
    restart: unless-stopped
    image: prom/alertmanager:v0.27.0
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    volumes:
    - alertmanager_data:/alertmanager
    ports:
    - 9093:9093
    networks:
    - argus
    configs:
    - source: alertmanager_alertmanager_yml
      target: /etc/alertmanager/alertmanager.yml
  blackbox:
    restart: unless-stopped
    image: prom/blackbox-exporter:v0.25.0
    command:
    - --config.file=/etc/blackbox/blackbox.yml
    ports:
    - 9115:9115
    networks:
    - argus
    cap_add:
    - NET_RAW
    configs:
    - source: blackbox_blackbox_yml
      target: /etc/blackbox/blackbox.yml
  pve-exporter:
    restart: unless-stopped
    image: prompve/prometheus-pve-exporter:3.4.4
    ports:
    - 9221:9221
    networks:
    - argus
    configs:
    - source: pve_yml
      target: /etc/pve.yml
  narrator:
    restart: unless-stopped
    image: ghcr.io/xniicki/argus-narrator:${ARGUS_TAG:-latest}
    environment:
      ARGUS_SITE: ${ARGUS_SITE:-homelab}
      ARGUS_EXTERNAL_URL: ${ARGUS_EXTERNAL_URL:-http://localhost:8088}
      PROMETHEUS_URL: http://prometheus:9090
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:-argus}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      PEER_NARRATOR_URL: ${PEER_NARRATOR_URL:-}
      PEER_SITE: ${PEER_SITE:-}
      WATCHDOG_DEADLINE_SECONDS: ${WATCHDOG_DEADLINE_SECONDS:-180}
      NARRATOR_LOG_LEVEL: ${NARRATOR_LOG_LEVEL:-INFO}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_ENABLED: ${LLM_ENABLED:-true}
    ports:
    - 8088:8088
    networks:
    - argus
    depends_on:
    - prometheus
    - loki
    configs:
    - source: narrator_config_narrator_yml
      target: /app/config/narrator.yml
  loki:
    restart: unless-stopped
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
    - loki_data:/loki
    ports:
    - 3100:3100
    networks:
    - argus
    configs:
    - source: loki_loki_config_yml
      target: /etc/loki/loki-config.yml
    - source: loki_rules_log_alerts_yml
      target: /loki/rules/fake/log_alerts.yml
    - source: loki_rules_security_yml
      target: /loki/rules/fake/security.yml
configs:
  prometheus_alerts_certs_yml:
    content: "# ============================================================================\n# SSL/TLS certificate expiry. Two thresholds -> two tiers.\n# probe_ssl_earliest_cert_expiry is a unix timestamp (seconds).\n# ============================================================================\ngroups:\n  - name: certs\n    rules:\n      - alert: CertExpiringSoon\n        expr: (probe_ssl_earliest_cert_expiry{job=\"blackbox-ssl\"} - time()) < (21 * 24 * 3600)\n        for: 1h\n        labels:\n          severity: warning\n          scope: single\n          component: cert\n        annotations:\n          summary: 'TLS cert for {{ $$labels.service }} expires in < 21 days'\n          description: 'Certificate on {{ $$labels.instance }} expires within 21 days (warning threshold).'\n          likely_cause: 'Automated renewal (ACME/certbot/Caddy/Traefik) did not run or failed; or a manual cert is approaching expiry.'\n          next_step: 'Trigger/inspect the renewal job (`certbot renew --dry-run`, check Caddy/Traefik ACME logs). Confirm DNS/HTTP-01 challenge reachability.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/cert-renew.md'\n\n      - alert: CertExpiringCritical\n        expr: (probe_ssl_earliest_cert_expiry{job=\"blackbox-ssl\"} - time()) < (5 * 24 * 3600)\n        for: 30m\n        labels:\n          severity: critical\n          scope: single\n          component: cert\n        annotations:\n          summary: 'TLS cert for {{ $$labels.service }} expires in < 5 days'\n          description: 'Certificate on {{ $$labels.instance }} is about to expire \u2014 clients will start failing TLS.'\n          likely_cause: 'Renewal has been failing for a while. Imminent outage for anything depending on this cert.'\n          next_step: 'Renew NOW and reload the serving process. Check why auto-renew has not fired since the 21-day warning.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/cert-renew.md'\n"
  prometheus_alerts_network_yml:
    content: "# ============================================================================\n# Network & internet \u2014 LAN gateway, WAN uptime, DNS, latency/packet loss,\n# and the homelab<->Hetzner cross-site path. The `tier` label\n# (gateway|wan|cross-site|dns) drives how serious the narrator treats it.\n# ============================================================================\ngroups:\n  - name: network\n    rules:\n      - alert: GatewayUnreachable\n        expr: probe_success{job=\"blackbox-icmp\", tier=\"gateway\"} == 0\n        for: 1m\n        labels:\n          severity: critical\n          scope: site\n          component: gateway\n        annotations:\n          summary: 'LAN gateway {{ $$labels.target_name }} unreachable'\n          description: 'ICMP to the gateway ({{ $$labels.instance }}) failing for >1m \u2014 local network is broken.'\n          likely_cause: 'Router rebooted/crashed, switch/VLAN problem, or this host lost its link.'\n          next_step: 'Check the router and switch; confirm this collector host still has link/IP. Nothing else on the LAN will work until this is back.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/gateway-down.md'\n\n      - alert: WanDown\n        # Both upstream anchors must fail to call it a real WAN outage.\n        expr: count(probe_success{job=\"blackbox-icmp\", tier=\"wan\"} == 0) == count(probe_success{job=\"blackbox-icmp\", tier=\"wan\"})\n        for: 2m\n        labels:\n          severity: critical\n          scope: site\n          component: wan\n        annotations:\n          summary: 'Internet (WAN) is down at {{ $$labels.site }}'\n          description: 'All upstream WAN anchors are unreachable for >2m \u2014 the site has no internet.'\n          likely_cause: 'ISP outage, modem/ONT down, or the router lost its WAN uplink. (Gateway may still be reachable on the LAN.)'\n          next_step: 'Check modem/ONT lights and router WAN status; reboot the modem if needed; check ISP status page.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/wan-down.md'\n\n      - alert: HighPacketLossWan\n        expr: avg_over_time(probe_icmp_duration_seconds{job=\"blackbox-icmp\", tier=\"wan\"}[5m]) == 0\n        for: 5m\n        labels:\n          severity: warning\n          scope: site\n          component: wan\n        annotations:\n          summary: 'WAN latency anomaly at {{ $$labels.site }}'\n          description: 'No successful ICMP RTT samples to WAN anchors over 5m \u2014 likely heavy packet loss.'\n          likely_cause: 'Congested or degraded uplink, ISP routing issue.'\n          next_step: 'Run a continuous ping/mtr to 1.1.1.1; check the router for errors/retransmits; contact ISP if persistent.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/wan-loss.md'\n\n      - alert: HighLatencyCrossSite\n        expr: avg_over_time(probe_icmp_duration_seconds{job=\"blackbox-icmp\", tier=\"cross-site\"}[5m]) > 0.15\n        for: 10m\n        labels:\n          severity: warning\n          scope: site\n          component: cross-site\n        annotations:\n          summary: 'High latency on homelab<->Hetzner path ({{ $$value | printf \"%.0f\" }}ms)'\n          description: 'Average RTT to the Hetzner path above 150ms for 10m.'\n          likely_cause: 'WAN congestion, suboptimal routing, or VPN/tunnel overhead between the sites.'\n          next_step: 'mtr to the peer; check the VPN/tunnel; compare against ISP baseline.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/cross-site-latency.md'\n\n      - alert: CrossSitePathDown\n        expr: probe_success{job=\"blackbox-icmp\", tier=\"cross-site\"} == 0\n        for: 3m\n        labels:\n          severity: critical\n          scope: site\n          component: cross-site\n        annotations:\n          summary: 'homelab<->Hetzner path is down'\n          description: 'Cannot reach the peer site over the network for >3m.'\n          likely_cause: 'Peer site WAN outage, VPN/tunnel down, or routing/firewall\
      \ change. (See peer cross-watch \u2014 the other side may already be alerting.)'\n          next_step: 'Check the VPN/tunnel and both sites'' WAN. The peer narrator''s cross-watch should corroborate which side is at fault.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/cross-site-down.md'\n\n      - alert: DnsResolutionFailing\n        expr: probe_success{job=\"blackbox-dns\"} == 0\n        for: 3m\n        labels:\n          severity: warning\n          scope: site\n          component: dns\n        annotations:\n          summary: 'DNS resolver {{ $$labels.resolver }} is failing'\n          description: 'Resolver {{ $$labels.instance }} returned no NOERROR for the test query for >3m.'\n          likely_cause: 'Resolver service down (Pi-hole/Unbound/router), upstream DNS outage, or blocklist update broke resolution.'\n          next_step: 'dig @resolver example.com; restart the resolver; check upstream DNS and recent blocklist changes.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/dns-down.md'\n"
  prometheus_alerts_proxmox_yml:
    content: "# ============================================================================\n# Proxmox VE \u2014 first-class target.\n#   pve_* metrics:   prometheus-pve-exporter (node/VM/LXC/storage/quorum)\n#   argus_* metrics: textfile collectors on the PVE host (ZFS health/scrub,\n#                    PVE/PBS backup success) \u2014 see agents/textfile-collectors/.\n# A guest dying (ProxmoxGuestDown) is DISTINCT from the host being down\n# (HostDown with role=hypervisor in uptime.yml).\n# ============================================================================\ngroups:\n  - name: proxmox\n    rules:\n      - alert: ProxmoxExporterDown\n        # We cannot see Proxmox at all (API/exporter unreachable).\n        expr: up{job=\"pve\"} == 0\n        for: 3m\n        labels:\n          severity: critical\n          scope: site\n          component: proxmox-api\n        annotations:\n          summary: 'Proxmox API unreachable ({{ $$labels.cluster }})'\n          description: 'prometheus-pve-exporter cannot reach the PVE API at {{ $$labels.instance }} for >3m. Proxmox visibility is lost.'\n          likely_cause: 'PVE host down, pveproxy/pvedaemon stopped, API token revoked/expired, or network path to the node broken.'\n          next_step: 'Check the PVE host (console/IPMI), `systemctl status pveproxy pvedaemon`, and the argus API token. Cross-check HostDown for the hypervisor.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/pve-api-down.md'\n\n      - alert: ProxmoxGuestDown\n        # A specific VM/LXC that should be running is not. Distinct from host down.\n        expr: pve_up{id=~\"qemu/.*|lxc/.*\"} == 0\n        for: 3m\n        labels:\n          severity: warning\n          scope: single\n          component: proxmox-guest\n        annotations:\n          summary: 'Proxmox guest {{ $$labels.id }} is not running'\n          description: 'Guest {{ $$labels.id }} on node {{ $$labels.node }} is stopped/paused while the PVE host is up.'\n          likely_cause: 'Guest crashed/OOM, was shut down, failed to boot after an update, or storage for its disk is unavailable.'\n          next_step: 'In the PVE UI check the guest task log & console. `qm status <id>` / `pct status <id>`. Look for OOM or disk errors before restarting.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/pve-guest-down.md'\n\n      - alert: ProxmoxStorageFull\n        expr: (pve_disk_usage_bytes{id=~\"storage/.*\"} / pve_disk_size_bytes{id=~\"storage/.*\"}) * 100 > 88\n        for: 15m\n        labels:\n          severity: warning\n          scope: site\n          component: proxmox-storage\n        annotations:\n          summary: 'Proxmox storage {{ $$labels.id }} is {{ $$value | printf \"%.0f\" }}% full'\n          description: 'PVE storage {{ $$labels.id }} above 88% used for 15m. Backups, snapshots and guest disks are at risk.'\n          likely_cause: 'Accumulating backups/snapshots/ISOs or a thin pool nearing capacity.'\n          next_step: 'Prune old backups/snapshots, check retention. For thin LVM/ZFS, watch for metadata exhaustion.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/pve-storage-full.md'\n\n      - alert: ProxmoxClusterNoQuorum\n        # Exporter exposes cluster quorum via pve_up{id=\"cluster/<name>\"}; 0 = not quorate.\n        # (No series on a single-node setup -> never fires, which is correct.)\n        expr: max by (id) (pve_up{id=~\"cluster/.*\"}) == 0\n        for: 1m\n        labels:\n          severity: critical\n          scope: site\n          component: proxmox-cluster\n        annotations:\n          summary: 'Proxmox cluster has lost quorum'\n          description: 'The PVE cluster is not quorate \u2014 HA actions and config changes are blocked.'\n          likely_cause: 'Corosync link loss between nodes, a node down, or network partition.'\n          next_step: 'Check `pvecm status`, corosync links, and inter-node connectivity. Restore the missing node or the corosync ring.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/pve-quorum.md'\n\
      \n      # --- ZFS (textfile collector: agents/textfile-collectors/zfs_health.sh) ---\n      - alert: ZfsPoolDegraded\n        expr: argus_zfs_pool_health > 0\n        for: 1m\n        labels:\n          severity: critical\n          scope: host\n          component: zfs\n        annotations:\n          summary: 'ZFS pool {{ $$labels.pool }} on {{ $$labels.host }} is not ONLINE'\n          description: 'Pool {{ $$labels.pool }} reports a non-healthy state (DEGRADED/FAULTED/OFFLINE).'\n          likely_cause: 'A vdev/disk failed or is unavailable; pool may be running without redundancy.'\n          next_step: '`zpool status -v {{ $$labels.pool }}` to find the bad device; replace/resilver. Verify backups before any risky action.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/zfs-degraded.md'\n\n      - alert: ZfsScrubOverdue\n        expr: argus_zfs_scrub_age_seconds > (35 * 24 * 3600)\n        for: 1h\n        labels:\n          severity: info\n          scope: host\n          component: zfs\n        annotations:\n          summary: 'ZFS pool {{ $$labels.pool }} scrub overdue (> 35 days)'\n          description: 'No completed scrub on {{ $$labels.pool }} for over 35 days \u2014 latent corruption may go undetected.'\n          likely_cause: 'Scrub schedule/cron not running.'\n          next_step: 'Run `zpool scrub {{ $$labels.pool }}` and confirm the periodic scrub timer is enabled.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/zfs-scrub.md'\n\n      # --- Backups (textfile collector: agents/textfile-collectors/pve_backup.sh) ---\n      - alert: ProxmoxBackupFailed\n        expr: argus_pve_backup_last_status != 0\n        for: 1m\n        labels:\n          severity: critical\n          scope: single\n          component: backup\n        annotations:\n          summary: 'Backup of {{ $$labels.guest }} failed (job {{ $$labels.job }})'\n          description: 'The most recent backup of guest {{ $$labels.guest }} did not complete successfully.'\n          likely_cause: 'Storage full/unreachable, PBS down, guest fsfreeze/agent issue, or job timeout.'\n          next_step: 'Check the vzdump/PBS task log for {{ $$labels.guest }}. Confirm backup storage health and re-run the job.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/pve-backup-failed.md'\n\n      - alert: ProxmoxBackupStale\n        expr: (time() - argus_pve_backup_last_success_timestamp) > (36 * 3600)\n        for: 1h\n        labels:\n          severity: warning\n          scope: single\n          component: backup\n        annotations:\n          summary: 'No successful backup of {{ $$labels.guest }} in > 36h'\n          description: 'Last successful backup of {{ $$labels.guest }} is older than 36h \u2014 recovery point is drifting.'\n          likely_cause: 'Backup schedule disabled/failing silently, or the job never started.'\n          next_step: 'Verify the backup schedule for {{ $$labels.guest }} and that the storage/PBS target is reachable.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/pve-backup-stale.md'\n"
  prometheus_alerts_resources_yml:
    content: "# ============================================================================\n# Metrics & resources \u2014 CPU, RAM, disk + SMART, temps, load, container health.\n# Uses node_exporter + cAdvisor series.\n# ============================================================================\ngroups:\n  - name: resources\n    rules:\n      - alert: HighCpu\n        expr: 100 * (1 - avg by (host, instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) > 90\n        for: 15m\n        labels:\n          severity: warning\n          scope: host\n          component: cpu\n        annotations:\n          summary: 'High CPU on {{ $$labels.host }} ({{ $$value | printf \"%.0f\" }}%)'\n          description: 'CPU utilisation on {{ $$labels.host }} has been > 90% for 15m.'\n          likely_cause: 'Runaway process, undersized guest, batch job, or a stuck/looping container.'\n          next_step: 'top/htop on the host; `docker stats`; check for a recently started job. Consider raising vCPU on the guest.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/high-cpu.md'\n\n      - alert: HighMemory\n        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 92\n        for: 10m\n        labels:\n          severity: warning\n          scope: host\n          component: memory\n        annotations:\n          summary: 'High memory on {{ $$labels.host }} ({{ $$value | printf \"%.0f\" }}%)'\n          description: 'Available memory on {{ $$labels.host }} below 8% for 10m \u2014 OOM risk.'\n          likely_cause: 'Memory leak, too many containers, or cache pressure. OOM killer may fire soon.'\n          next_step: 'Check `free -h`, top memory consumers, container limits. Restart the offending service or add RAM to the guest.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/high-memory.md'\n\n      - alert: DiskFillingUp\n        expr: |\n          (node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs\"}\n            / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs\"}) * 100 < 12\n        for: 15m\n        labels:\n          severity: warning\n          scope: host\n          component: disk\n        annotations:\n          summary: 'Low disk on {{ $$labels.host }} {{ $$labels.mountpoint }} ({{ $$value | printf \"%.0f\" }}% free)'\n          description: 'Filesystem {{ $$labels.mountpoint }} on {{ $$labels.host }} below 12% free for 15m.'\n          likely_cause: 'Logs/backups/images growing, a runaway writer, or snapshots accumulating.'\n          next_step: 'du -xh --max-depth=1 on the mount; prune logs/images/old backups; check snapshot retention.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/disk-full.md'\n\n      - alert: DiskWillFillSoon\n        # Linear-predict: will this filesystem hit 0 within 12h based on last 6h slope?\n        expr: |\n          predict_linear(node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs\"}[6h], 12*3600) < 0\n        for: 30m\n        labels:\n          severity: critical\n          scope: host\n          component: disk\n        annotations:\n          summary: 'Disk on {{ $$labels.host }} {{ $$labels.mountpoint }} will fill within ~12h'\n          description: 'Projected to reach 0 bytes free within 12h at the current write rate.'\n          likely_cause: 'Sustained write growth \u2014 runaway log, backup loop, or a stuck process writing fast.'\n          next_step: 'Identify the writer NOW (`iotop`, `du`), stop/rotate it before the filesystem fills and services crash.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/disk-full.md'\n\n      - alert: SmartFailurePredicted\n        expr: smartmon_device_smart_healthy == 0 or node_smartmon_device_smart_healthy == 0\n        for: 5m\n        labels:\n          severity: critical\n          scope: host\n          component: disk-smart\n        annotations:\n          summary: 'SMART reports a failing disk on {{ $$labels.host }}'\n          description: 'A disk on {{ $$labels.host\
      \ }} reports SMART health = not OK. Drive failure may be imminent.'\n          likely_cause: 'Physical disk degradation (reallocated/pending sectors, wear-out).'\n          next_step: 'Run `smartctl -a <dev>`, ensure backups are current, plan a replacement. On ZFS, check pool redundancy first.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/smart-fail.md'\n\n      - alert: HighTemperature\n        expr: node_hwmon_temp_celsius > 85\n        for: 10m\n        labels:\n          severity: warning\n          scope: host\n          component: temperature\n        annotations:\n          summary: 'High temperature on {{ $$labels.host }} ({{ $$value | printf \"%.0f\" }}\xB0C)'\n          description: 'Sensor {{ $$labels.sensor }} on {{ $$labels.host }} above 85\xB0C for 10m.'\n          likely_cause: 'Cooling/airflow problem, dust, failed fan, or sustained load.'\n          next_step: 'Check fans and intake temps; reduce load; verify the chassis is not enclosed/overheating.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/high-temp.md'\n\n      - alert: HighLoad\n        expr: node_load5 / count by (host, instance) (node_cpu_seconds_total{mode=\"idle\"}) > 2\n        for: 15m\n        labels:\n          severity: warning\n          scope: host\n          component: load\n        annotations:\n          summary: 'High load average on {{ $$labels.host }}'\n          description: '5-min load per core on {{ $$labels.host }} above 2.0 for 15m \u2014 contention.'\n          likely_cause: 'CPU oversubscription or IO wait (blocked tasks). Often disk/IO rather than CPU.'\n          next_step: 'Check `uptime`, iowait in `top`, and disk latency. Distinguish CPU-bound vs IO-bound.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/high-load.md'\n\n      - alert: ContainerRestartLoop\n        expr: increase(container_start_time_seconds{name!=\"\"}[15m]) > 3\n        for: 5m\n        labels:\n          severity: warning\n          scope: single\n          component: container\n        annotations:\n          summary: 'Container {{ $$labels.name }} is restart-looping on {{ $$labels.host }}'\n          description: 'Container {{ $$labels.name }} restarted >3 times in 15m (crash loop).'\n          likely_cause: 'Bad config/env, failing health check, missing dependency, or OOM-kill.'\n          next_step: '`docker logs <name>` for the crash reason; check the health check and resource limits.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/container-crashloop.md'\n"
  prometheus_alerts_security_yml:
    content: "# ============================================================================\n# Security & change detection \u2014 fires when host state fingerprints CHANGE.\n# Metrics come from agents/textfile-collectors/security_state.sh via node_exporter.\n# changes(metric[10m]) > 0  => the underlying state changed in the last 10m.\n# ============================================================================\ngroups:\n  - name: security_change\n    rules:\n      - alert: AuthorizedKeysChanged\n        expr: changes(argus_ssh_authorized_keys_hash[10m]) > 0\n        for: 0m\n        labels:\n          severity: warning\n          scope: host\n          component: change\n        annotations:\n          summary: 'SSH authorized_keys changed on {{ $$labels.host }}'\n          description: 'The set of authorized SSH keys on {{ $$labels.host }} was added to, removed, or edited.'\n          likely_cause: 'A new key was deployed (intentional) \u2014 or an attacker installed a persistence key.'\n          next_step: 'If you did not change keys, treat as a breach: inspect /root/.ssh and /home/*/.ssh, rotate, and audit logins.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/authorized-keys-changed.md'\n\n      - alert: FirewallRulesChanged\n        expr: changes(argus_firewall_ruleset_hash[10m]) > 0\n        for: 0m\n        labels:\n          severity: warning\n          scope: host\n          component: change\n        annotations:\n          summary: 'Firewall ruleset changed on {{ $$labels.host }}'\n          description: 'The active firewall ruleset (nft/iptables/ufw) on {{ $$labels.host }} changed.'\n          likely_cause: 'A deploy/admin change \u2014 or an attacker opening a path.'\n          next_step: 'Diff the current ruleset against your expected config; confirm the change was intentional.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/firewall-changed.md'\n\n      - alert: ListeningPortsChanged\n        expr: changes(argus_listening_ports_hash[10m]) > 0\n        for: 0m\n        labels:\n          severity: info\n          scope: host\n          component: change\n        annotations:\n          summary: 'Listening ports changed on {{ $$labels.host }}'\n          description: 'A service started or stopped listening on {{ $$labels.host }}.'\n          likely_cause: 'A new service was deployed/restarted \u2014 or an unexpected process opened a port.'\n          next_step: 'Run `ss -lntup` on the host and confirm every new listener is expected.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/ports-changed.md'\n\n      - alert: InstalledPackagesChanged\n        expr: changes(argus_installed_packages_hash[10m]) > 0\n        for: 0m\n        labels:\n          severity: info\n          scope: host\n          component: change\n        annotations:\n          summary: 'Installed packages changed on {{ $$labels.host }}'\n          description: 'The installed package set on {{ $$labels.host }} changed (install/remove/upgrade).'\n          likely_cause: 'Routine updates (apt/dnf) \u2014 or unexpected software being installed.'\n          next_step: 'Confirm it matches a planned update window; review the package manager history if not.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/packages-changed.md'\n"
  prometheus_alerts_uptime_yml:
    content: "# ============================================================================\n# Uptime & reachability \u2014 hosts, service ports, HTTP endpoints.\n# Label convention (consumed by the narrator's urgency engine):\n#   severity: info|warning|critical   scope: single|host|site\n#   component: <kind>                  role:  carried from target labels\n# Annotations: summary / description / likely_cause / next_step / runbook\n# ============================================================================\ngroups:\n  - name: uptime\n    rules:\n      - alert: HostDown\n        # node_exporter unreachable = the whole host is (probably) down.\n        expr: up{job=\"node\"} == 0\n        for: 2m\n        labels:\n          severity: critical\n          scope: host\n          component: host\n        annotations:\n          summary: 'Host {{ $$labels.host }} is unreachable'\n          description: 'node_exporter on {{ $$labels.instance }} (host {{ $$labels.host }}, role {{ $$labels.role }}) has not responded for >2m.'\n          likely_cause: 'Host powered off / crashed / kernel panic, network link down, or node_exporter stopped. If many hosts on one site dropped together, suspect the site uplink rather than the host.'\n          next_step: 'Check power & console (Proxmox UI for guests). Ping the host; if it answers but the exporter is down, restart node_exporter. Check the switch/VLAN.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/host-down.md'\n\n      - alert: ServicePortDown\n        expr: probe_success{job=\"blackbox-tcp\"} == 0\n        for: 2m\n        labels:\n          severity: warning\n          scope: single\n          component: service-port\n        annotations:\n          summary: 'Service {{ $$labels.service }} TCP port unreachable'\n          description: 'TCP probe to {{ $$labels.instance }} ({{ $$labels.service }}) failing for >2m while its host may still be up.'\n          likely_cause: 'The service crashed or stopped listening, a firewall rule changed, or the port moved. Host-level reachability is tracked separately.'\n          next_step: 'On the host: `systemctl status <svc>` / `ss -ltnp | grep <port>`. Check recent deploys and firewall (ufw/nft) changes.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/service-down.md'\n\n      - alert: HttpEndpointDown\n        expr: probe_success{job=\"blackbox-http\"} == 0\n        for: 2m\n        labels:\n          severity: warning\n          scope: single\n          component: endpoint\n        annotations:\n          summary: 'HTTP endpoint {{ $$labels.service }} is failing'\n          description: 'HTTP probe to {{ $$labels.instance }} returned non-2xx or timed out for >2m.'\n          likely_cause: 'App returning 5xx, backend/dependency down, TLS error, or the reverse proxy is misrouting.'\n          next_step: 'curl -v the endpoint, check app + reverse-proxy logs (link below), confirm upstream/database health.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/http-down.md'\n\n      - alert: HttpEndpointSlow\n        expr: probe_http_duration_seconds{job=\"blackbox-http\"} > 3\n        for: 5m\n        labels:\n          severity: warning\n          scope: single\n          component: endpoint\n        annotations:\n          summary: 'HTTP endpoint {{ $$labels.service }} is slow'\n          description: '{{ $$labels.instance }} response time > 3s (currently {{ $$value | printf \"%.1f\" }}s) for >5m.'\n          likely_cause: 'CPU/IO saturation on the backend, slow dependency, or GC/connection-pool exhaustion.'\n          next_step: 'Correlate with host CPU/IO metrics; inspect slow-query and app latency logs.'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/http-slow.md'\n"
  prometheus_alerts_watchdog_yml:
    content: "# ============================================================================\n# Watchdog \u2014 the dead-man's switch.\n# This alert ALWAYS fires. Alertmanager forwards it to the narrator on a steady\n# cadence. The narrator resets a deadline on every Watchdog it receives; if the\n# heartbeat stops (Prometheus/Alertmanager/local pipeline dead), the narrator\n# self-alarms. If the WHOLE local stack is down, the PEER narrator's cross-watch\n# catches it instead \u2014 so an outage cannot silence its own alarm.\n# ============================================================================\ngroups:\n  - name: watchdog\n    rules:\n      - alert: Watchdog\n        expr: vector(1)\n        labels:\n          severity: info\n          scope: site\n          component: watchdog\n        annotations:\n          summary: 'Argus heartbeat'\n          description: 'Steady-state heartbeat proving the alerting pipeline (Prometheus -> Alertmanager -> narrator) is alive.'\n          likely_cause: ''\n          next_step: ''\n          runbook: ''\n"
  prometheus_prometheus_yml:
    content: "# ============================================================================\n# Argus \u2014 Prometheus. Targets live in ./targets/*.yml (file_sd) so you add\n# hosts/endpoints WITHOUT editing this file. Alert rules in ./alerts/*.yml.\n# ============================================================================\nglobal:\n  scrape_interval: 30s\n  scrape_timeout: 10s\n  evaluation_interval: 30s\n  external_labels:\n    site: $${ARGUS_SITE}          # set via env in compose; identifies homelab vs hetzner\n\nrule_files:\n  - /etc/prometheus/alerts/*.yml\n\nalerting:\n  alertmanagers:\n    - static_configs:\n        - targets: [\"alertmanager:9093\"]\n\nscrape_configs:\n  # --- Prometheus self-monitoring ------------------------------------------\n  - job_name: prometheus\n    static_configs:\n      - targets: [\"localhost:9090\"]\n\n  # --- node_exporter on every host (CPU/RAM/disk/SMART/temps/load) ----------\n  - job_name: node\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/nodes.yml\"]\n    relabel_configs:\n      - source_labels: [__address__]\n        target_label: instance\n\n  # --- cAdvisor (container health/resource) --------------------------------\n  - job_name: cadvisor\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/cadvisor.yml\"]\n\n  # --- prometheus-pve-exporter (Proxmox node/VM/LXC/storage/backup) ---------\n  # The exporter takes the PVE target as a `target` URL param and proxies.\n  - job_name: pve\n    metrics_path: /pve\n    params:\n      module: [default]\n      cluster: [\"1\"]\n      node: [\"1\"]\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/pve.yml\"]\n    relabel_configs:\n      - source_labels: [__address__]\n        target_label: __param_target\n      - source_labels: [__param_target]\n        target_label: instance\n      - target_label: __address__\n        replacement: pve-exporter:9221\n\n  # --- Blackbox: HTTP endpoints --------------------------------------------\n  - job_name: blackbox-http\n    metrics_path: /probe\n    params:\n      module: [http_2xx]      # strict TLS by default; opt out per-target with `tls: insecure`\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/blackbox-http.yml\"]\n    relabel_configs:\n      - source_labels: [__address__]\n        target_label: __param_target\n      - source_labels: [__param_target]\n        target_label: instance\n      # targets labelled `tls: insecure` (self-signed) use the no-verify module\n      - source_labels: [tls]\n        regex: insecure\n        target_label: __param_module\n        replacement: http_2xx_insecure\n      - target_label: __address__\n        replacement: blackbox:9115\n\n  # --- Blackbox: TCP service ports -----------------------------------------\n  - job_name: blackbox-tcp\n    metrics_path: /probe\n    params:\n      module: [tcp_connect]\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/blackbox-tcp.yml\"]\n    relabel_configs:\n      - source_labels: [__address__]\n        target_label: __param_target\n      - source_labels: [__param_target]\n        target_label: instance\n      - target_label: __address__\n        replacement: blackbox:9115\n\n  # --- Blackbox: ICMP (LAN/gateway/WAN/peer reachability + latency) ---------\n  - job_name: blackbox-icmp\n    metrics_path: /probe\n    params:\n      module: [icmp]\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/blackbox-icmp.yml\"]\n    relabel_configs:\n      - source_labels: [__address__]\n        target_label: __param_target\n      - source_labels: [__param_target]\n        target_label: instance\n      - target_label: __address__\n        replacement: blackbox:9115\n\n  # --- Blackbox: SSL cert expiry (HTTPS) -----------------------------------\n  - job_name: blackbox-ssl\n    metrics_path: /probe\n    params:\n      module: [http_2xx]      # http_2xx records probe_ssl_earliest_cert_expiry (TLS verified)\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/blackbox-ssl.yml\"]\n    relabel_configs:\n      - source_labels: [__address__]\n\
      \        target_label: __param_target\n      - source_labels: [__param_target]\n        target_label: instance\n      # self-signed targets (e.g. Proxmox UI) labelled `tls: insecure` skip verification\n      - source_labels: [tls]\n        regex: insecure\n        target_label: __param_module\n        replacement: http_2xx_insecure\n      - target_label: __address__\n        replacement: blackbox:9115\n\n  # --- DNS resolution checks -----------------------------------------------\n  - job_name: blackbox-dns\n    metrics_path: /probe\n    params:\n      module: [dns_udp]\n    file_sd_configs:\n      - files: [\"/etc/prometheus/targets/blackbox-dns.yml\"]\n    relabel_configs:\n      - source_labels: [__address__]\n        target_label: __param_target\n      - source_labels: [__param_target]\n        target_label: instance\n      - target_label: __address__\n        replacement: blackbox:9115\n"
  prometheus_targets_blackbox_dns_yml:
    content: |
      # DNS resolution checks. The probe target is the DNS server; the queried name
      # is set in blackbox.yml (dns_udp module). Add more resolvers as needed.
      - targets:
          - "192.168.1.1"            # local resolver / router
        labels:
          resolver: lan-dns
          tier: dns
          site: homelab
      - targets:
          - "1.1.1.1"                # upstream resolver
        labels:
          resolver: cloudflare-dns
          tier: dns
          site: homelab
  prometheus_targets_blackbox_http_yml:
    content: |
      # HTTP endpoints to probe for availability/correctness (2xx).
      - targets:
          - "http://192.168.1.20:3000/healthz"
        labels:
          service: app1-web
          role: service
          site: homelab
      - targets:
          - "https://hetzner.example.net"
        labels:
          service: vps-public
          role: edge
          site: hetzner
  prometheus_targets_blackbox_icmp_yml:
    content: "# ICMP reachability + latency/packet-loss. Covers LAN, gateway, WAN, and the\n# homelab<->Hetzner path. `tier` lets rules treat gateway/WAN specially.\n- targets:\n    - \"192.168.1.1\"            # LAN gateway / router\n  labels:\n    target_name: gateway\n    tier: gateway\n    site: homelab\n- targets:\n    - \"1.1.1.1\"                # WAN reachability (upstream internet)\n    - \"8.8.8.8\"\n  labels:\n    target_name: wan\n    tier: wan\n    site: homelab\n- targets:\n    - \"10.0.0.5\"               # Hetzner VPS \u2014 the cross-site path\n  labels:\n    target_name: hetzner-path\n    tier: cross-site\n    site: homelab\n"
  prometheus_targets_blackbox_ssl_yml:
    content: |
      # HTTPS endpoints whose certificate expiry we track.
      - targets:
          - "https://hetzner.example.net"
        labels:
          service: vps-public
          role: edge
          site: hetzner
      - targets:
          - "https://192.168.1.10:8006"   # Proxmox UI cert
        labels:
          service: pve-webui
          role: hypervisor
          site: homelab
          tls: insecure                   # self-signed: skip chain/hostname verify (expiry still tracked)
  prometheus_targets_blackbox_tcp_yml:
    content: |
      # TCP service ports to probe (connect succeeds = up).
      - targets:
          - "192.168.1.10:8006"      # Proxmox web UI
        labels:
          service: pve-webui
          role: hypervisor
          site: homelab
      - targets:
          - "192.168.1.20:22"        # SSH
        labels:
          service: app1-ssh
          role: service
          site: homelab
      - targets:
          - "10.0.0.5:443"
        labels:
          service: vps-https
          role: edge
          site: hetzner
  prometheus_targets_cadvisor_yml:
    content: "# cAdvisor targets \u2014 hosts running containers.\n- targets:\n    - \"192.168.1.20:8080\"\n  labels:\n    host: app1\n    role: service\n    site: homelab\n- targets:\n    - \"10.0.0.5:8080\"\n  labels:\n    host: vps1\n    role: edge\n    site: hetzner\n"
  prometheus_targets_nodes_yml:
    content: "# node_exporter targets \u2014 one entry per host running the Argus agent.\n# `role` feeds the narrator's component-criticality scoring (see narrator.yml).\n- targets:\n    - \"192.168.1.10:9100\"      # proxmox PVE host\n  labels:\n    host: pve1\n    role: hypervisor\n    site: homelab\n- targets:\n    - \"192.168.1.20:9100\"      # example LXC/VM with node_exporter\n  labels:\n    host: app1\n    role: service\n    site: homelab\n- targets:\n    - \"10.0.0.5:9100\"          # Hetzner VPS\n  labels:\n    host: vps1\n    role: edge\n    site: hetzner\n"
  prometheus_targets_pve_yml:
    content: |
      # Proxmox VE nodes to scrape via prometheus-pve-exporter.
      # The address here becomes the `target` param handed to the exporter.
      - targets:
          - "192.168.1.10"           # PVE node / cluster member
        labels:
          cluster: homelab-pve
          site: homelab
  alertmanager_alertmanager_yml:
    content: "# ============================================================================\n# Argus \u2014 Alertmanager. Deliberately \"dumb\": it forwards ALL alerts to the\n# narrator webhook. Tiering, repeat-until-ack, dedup and message composition\n# all live in the narrator so the policy is in ONE place.\n# ============================================================================\nglobal:\n  resolve_timeout: 5m\n\nroute:\n  receiver: narrator\n  # Keep alerts granular so the narrator sees each component distinctly.\n  group_by: ['alertname', 'instance', 'host', 'service']\n  group_wait: 10s\n  group_interval: 1m\n  repeat_interval: 1h          # narrator does its own repeat-until-ack for high tiers\n  routes:\n    # Heartbeat: forward frequently so the narrator's dead-man timer stays fed.\n    - receiver: narrator\n      matchers:\n        - alertname = \"Watchdog\"\n      group_wait: 0s\n      group_interval: 1m\n      repeat_interval: 1m\n      continue: false\n\nreceivers:\n  - name: narrator\n    webhook_configs:\n      - url: http://narrator:8088/alerts/alertmanager\n        send_resolved: true\n        max_alerts: 0           # send all alerts in the group, never truncate\n\n# No inhibition here \u2014 the narrator handles correlation/suppression so the logic\n# stays testable and in one language.\ninhibit_rules: []\n"
  blackbox_blackbox_yml:
    content: "# ============================================================================\n# Argus \u2014 Blackbox exporter modules.\n# ============================================================================\nmodules:\n  # HTTP up + (for HTTPS) records probe_ssl_earliest_cert_expiry for cert rules.\n  # TLS is VERIFIED here: an invalid/untrusted/expired cert on a public endpoint\n  # fails the probe (and pages you). Internal self-signed targets must instead use\n  # the http_2xx_insecure module below (opt in via a `tls: insecure` target label).\n  http_2xx:\n    prober: http\n    timeout: 8s\n    http:\n      valid_http_versions: [\"HTTP/1.1\", \"HTTP/2.0\"]\n      valid_status_codes: []          # default = 2xx\n      method: GET\n      follow_redirects: true\n      preferred_ip_protocol: ip4\n      ip_protocol_fallback: true\n\n  # Same as http_2xx but skips TLS verification \u2014 for internal self-signed certs\n  # (e.g. the Proxmox UI). Cert EXPIRY is still recorded, so expiry alerts keep\n  # working; only chain/hostname/trust validation is waived. Do NOT use this for\n  # public endpoints. Select it with `tls: insecure` on the target in file_sd.\n  http_2xx_insecure:\n    prober: http\n    timeout: 8s\n    http:\n      valid_http_versions: [\"HTTP/1.1\", \"HTTP/2.0\"]\n      valid_status_codes: []\n      method: GET\n      follow_redirects: true\n      preferred_ip_protocol: ip4\n      ip_protocol_fallback: true\n      tls_config:\n        insecure_skip_verify: true\n\n  # POST variant for endpoints that need it.\n  http_post_2xx:\n    prober: http\n    timeout: 8s\n    http:\n      method: POST\n      preferred_ip_protocol: ip4\n\n  # Raw TCP connect (service ports: SSH, DB, web UI, etc.)\n  tcp_connect:\n    prober: tcp\n    timeout: 6s\n    tcp:\n      preferred_ip_protocol: ip4\n\n  # ICMP echo \u2014 reachability + RTT (probe_icmp_duration_seconds) + loss.\n  icmp:\n    prober: icmp\n    timeout: 5s\n    icmp:\n      preferred_ip_protocol: ip4\n\n  # DNS resolution check against the probed resolver.\n  dns_udp:\n    prober: dns\n    timeout: 5s\n    dns:\n      transport_protocol: udp\n      query_name: \"example.com\"       # change to a name you always expect to resolve\n      query_type: A\n      valid_rcodes: [\"NOERROR\"]\n"
  narrator_config_narrator_yml:
    content: |
      # ============================================================================
      # Argus narrator policy. Env vars (ARGUS_SITE, NTFY_*, PROMETHEUS_URL,
      # PEER_NARRATOR_URL, WATCHDOG_DEADLINE_SECONDS) override matching fields.
      # ============================================================================
      site: homelab
      external_url: http://argus.lan:8088
      prometheus_url: http://prometheus:9090
      peer_narrator_url: ""
      peer_site: hetzner

      # Dead-man's switch: if no Watchdog heartbeat within this many seconds, self-alarm.
      watchdog_deadline_s: 180

      # Flap detection: N firings of the same alert within the window bumps urgency.
      flap_window_s: 1800
      flap_threshold: 4

      ntfy:
        server: https://ntfy.xniicki.de
        topic: argus
        token: ""        # prefer NTFY_TOKEN env

      # --- Phase 4: optional LLM root-cause hints via OpenRouter -----------------
      # Disabled unless OPENROUTER_API_KEY (env) is set. Adds one "AI HINT" line.
      llm:
        enabled: true                          # also gated by presence of an API key
        base_url: https://openrouter.ai/api/v1 # prefer OPENROUTER_BASE_URL env
        api_key: ""                            # prefer OPENROUTER_API_KEY env
        model: anthropic/claude-3.5-sonnet     # prefer OPENROUTER_MODEL env
        max_tokens: 220
        timeout_s: 20

      # --- Urgency engine: score = severity + scope + component + role + recurrence ---
      urgency:
        severity_points:   { info: 0, warning: 3, critical: 6 }
        scope_points:      { single: 0, host: 2, site: 3 }
        recurrence_bonus:  1            # added when the alert is flapping (>= flap_threshold)

        # Additive weight by `component` label (what kind of thing broke).
        component_weights:
          proxmox-guest: 1
          zfs: 1
          proxmox-api: 0
          backup: 0
          cert: 0
          watchdog: -100               # never notifies via the normal path
          endpoint: 0
          service-port: 0
          security: 0                  # tier driven by severity+scope (SSH brute-force etc.)
          change: 0                    # config/state change tracking
          logs: 0

        # Additive weight by `role` label (how important the affected host is).
        role_weights:
          hypervisor: 3                 # PVE host down -> push to Emergency
          edge: 1                       # Hetzner VPS matters
          service: 0

        # score -> tier (highest threshold whose min <= score wins)
        thresholds:
          info: 0
          notice: 2
          warning: 4
          critical: 7
          emergency: 10

        # Force a tier regardless of score (escape hatch).
        overrides: {}
          # CrossSitePathDown: critical
          # ProxmoxBackupFailed: critical

      # --- How each tier is delivered over ntfy ---------------------------------
      # ntfy priorities: 1=min 2=low 3=default 4=high 5=max
      tier_policies:
        info:      { priority: 1, push: false, tags: [mag] }
        notice:    { priority: 2, push: true,  tags: [bell] }
        warning:   { priority: 3, push: true,  tags: [warning] }
        critical:  { priority: 4, push: true,  tags: [rotating_light], repeat_until_ack: true,  repeat_interval_s: 300 }
        emergency: { priority: 5, push: true,  tags: [rotating_light, sos], repeat_until_ack: true, repeat_interval_s: 180 }
  loki_loki_config_yml:
    content: "# ============================================================================\n# Argus \u2014 Loki (monolithic, filesystem). Includes the RULER so LogQL alerts\n# flow the same path as metric alerts: Loki ruler -> Alertmanager -> narrator.\n# ============================================================================\nauth_enabled: false\n\nserver:\n  http_listen_port: 3100\n  grpc_listen_port: 9096\n  log_level: info\n\ncommon:\n  instance_addr: 127.0.0.1\n  path_prefix: /loki\n  storage:\n    filesystem:\n      chunks_directory: /loki/chunks\n      rules_directory: /loki/rules\n  replication_factor: 1\n  ring:\n    kvstore:\n      store: inmemory\n\nschema_config:\n  configs:\n    - from: 2024-01-01\n      store: tsdb\n      object_store: filesystem\n      schema: v13\n      index:\n        prefix: index_\n        period: 24h\n\nlimits_config:\n  retention_period: 30d\n  ingestion_rate_mb: 16\n  ingestion_burst_size_mb: 32\n  max_query_series: 5000\n  allow_structured_metadata: true\n\ncompactor:\n  working_directory: /loki/compactor\n  retention_enabled: true\n  delete_request_store: filesystem\n\n# Evaluate LogQL alert rules and forward to Alertmanager (-> narrator).\nruler:\n  storage:\n    type: local\n    local:\n      directory: /loki/rules\n  rule_path: /loki/rule-tmp\n  alertmanager_url: http://alertmanager:9093\n  enable_alertmanager_v2: true\n  enable_api: true\n  ring:\n    kvstore:\n      store: inmemory\n"
  loki_rules_log_alerts_yml:
    content: "# ============================================================================\n# Loki ruler \u2014 LogQL alerts. Same label convention as metric rules\n# (severity/scope/component) so the narrator tiers them identically.\n# component: logs  -> narrator adds a Logs link to the push.\n# ============================================================================\ngroups:\n  - name: logs\n    rules:\n      - alert: AppErrorBurst\n        expr: |\n          sum by (host, job, container) (\n            rate({job=~\"docker|containers\"} |~ \"(?i)\\\\b(error|exception|fatal|panic|traceback)\\\\b\" [5m])\n          ) > 0.5\n        for: 5m\n        labels:\n          severity: warning\n          scope: single\n          component: logs\n        annotations:\n          summary: 'Error burst in {{ $$labels.container }} on {{ $$labels.host }}'\n          description: 'Sustained error-level log lines (>0.5/s over 5m) from {{ $$labels.container }}.'\n          likely_cause: 'A bug, a failing dependency, or bad input causing repeated exceptions.'\n          next_step: 'Open the logs (link) and read the top recurring error; correlate with recent deploys.'\n          logs: 'http://loki.lan:3100'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/app-errors.md'\n\n      - alert: SystemErrorBurst\n        expr: |\n          sum by (host) (\n            rate({job=\"journal\"} |~ \"(?i)(segfault|I/O error|EXT4-fs error|kernel panic|hung_task)\" [5m])\n          ) > 0\n        for: 2m\n        labels:\n          severity: critical\n          scope: host\n          component: logs\n        annotations:\n          summary: 'Kernel/system errors on {{ $$labels.host }}'\n          description: 'The kernel journal on {{ $$labels.host }} shows hardware/filesystem/kernel errors.'\n          likely_cause: 'Failing disk, RAM faults, or a kernel-level fault.'\n          next_step: 'Check dmesg/journal (link), SMART status, and memory; this can precede data loss.'\n          logs: 'http://loki.lan:3100'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/system-errors.md'\n\n      - alert: OutOfMemoryKill\n        expr: |\n          sum by (host) (count_over_time({job=\"journal\"} |~ \"Out of memory: Kill\" [5m])) > 0\n        for: 0m\n        labels:\n          severity: warning\n          scope: host\n          component: logs\n        annotations:\n          summary: 'OOM killer fired on {{ $$labels.host }}'\n          description: 'The kernel killed a process due to memory exhaustion on {{ $$labels.host }}.'\n          likely_cause: 'A process exceeded available memory; a container without a sane limit, or a leak.'\n          next_step: 'Identify the killed process in the journal (link); set/adjust memory limits or add RAM.'\n          logs: 'http://loki.lan:3100'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/oom.md'\n"
  loki_rules_security_yml:
    content: "# ============================================================================\n# Loki ruler \u2014 security events from logs (sshd / sudo via the journal).\n# component: security  -> narrator tiers by severity+scope and adds a Logs link.\n# ============================================================================\ngroups:\n  - name: security\n    rules:\n      - alert: SSHBruteForce\n        expr: |\n          sum by (host) (count_over_time({job=\"journal\"} |~ \"Failed password|Invalid user|authentication failure\" [5m])) > 10\n        for: 0m\n        labels:\n          severity: warning\n          scope: host\n          component: security\n        annotations:\n          summary: 'Possible SSH brute-force on {{ $$labels.host }}'\n          description: '>10 failed SSH auth attempts on {{ $$labels.host }} within 5m.'\n          likely_cause: 'Automated credential-stuffing/brute-force from one or more IPs, or a misconfigured client.'\n          next_step: 'Check the source IPs in the journal (link); confirm fail2ban/firewall is active; consider key-only auth.'\n          logs: 'http://loki.lan:3100'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/ssh-bruteforce.md'\n\n      - alert: SSHRootLogin\n        expr: |\n          sum by (host) (count_over_time({job=\"journal\"} |~ \"Accepted (password|publickey) for root\" [5m])) > 0\n        for: 0m\n        labels:\n          severity: info\n          scope: host\n          component: security\n        annotations:\n          summary: 'Root logged in over SSH on {{ $$labels.host }}'\n          description: 'A successful root SSH login occurred on {{ $$labels.host }}.'\n          likely_cause: 'An admin session \u2014 or unauthorised access if you did not initiate it.'\n          next_step: 'Confirm this was you (source IP in logs). If not, rotate credentials and investigate immediately.'\n          logs: 'http://loki.lan:3100'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/ssh-root-login.md'\n\n      - alert: SudoAuthFailure\n        expr: |\n          sum by (host) (count_over_time({job=\"journal\"} |~ \"sudo:.*authentication failure|sudo:.*incorrect password\" [10m])) > 3\n        for: 0m\n        labels:\n          severity: warning\n          scope: host\n          component: security\n        annotations:\n          summary: 'Repeated sudo failures on {{ $$labels.host }}'\n          description: '>3 failed sudo authentications on {{ $$labels.host }} within 10m.'\n          likely_cause: 'A user fat-fingering a password \u2014 or an attempt to escalate privileges.'\n          next_step: 'Identify the user/tty in the journal (link); verify it was legitimate.'\n          logs: 'http://loki.lan:3100'\n          runbook: 'https://github.com/your-org/argus/blob/main/docs/runbooks/sudo-failure.md'\n"
  pve_yml:
    content: |
      default:
        user: ${PVE_USER:-argus@pve}
        token_name: ${PVE_TOKEN_NAME:-monitoring}
        token_value: ${PVE_TOKEN_VALUE:-}
        verify_ssl: false
