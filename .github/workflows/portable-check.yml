name: portable-check

# Guards the single-source-of-truth invariant: docker-compose.portable.yml must
# always equal `make portable` output. Fails if a config changed but the portable
# file wasn't regenerated.
on:
  push:
    branches: [main]
    paths:
      - "prometheus/**"
      - "alertmanager/**"
      - "blackbox/**"
      - "loki/**"
      - "narrator/config/**"
      - "docker-compose.yml"
      - "scripts/gen-portable-compose.py"
      - "docker-compose.portable.yml"
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Regenerate portable compose
        run: python scripts/gen-portable-compose.py
      - name: Fail if it drifted from the committed file
        run: |
          if ! git diff --exit-code -- docker-compose.portable.yml; then
            echo "::error::docker-compose.portable.yml is stale. Run 'make portable' and commit." >&2
            exit 1
          fi
      - name: Validate it parses
        run: docker compose -f docker-compose.portable.yml config -q
