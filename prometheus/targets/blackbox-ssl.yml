# HTTPS endpoints whose certificate expiry we track.
- targets:
    - "https://hetzner.example.net"
  labels:
    service: vps-public
    role: edge
    site: hetzner
- targets:
    - "https://192.168.1.10:8006"   # Proxmox UI cert
  labels:
    service: pve-webui
    role: hypervisor
    site: homelab
    tls: insecure                   # self-signed: skip chain/hostname verify (expiry still tracked)
