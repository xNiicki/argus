# node_exporter targets — one entry per host running the Argus agent.
# `role` feeds the narrator's component-criticality scoring (see narrator.yml).
- targets:
    - "192.168.1.10:9100"      # proxmox PVE host
  labels:
    host: pve1
    role: hypervisor
    site: homelab
- targets:
    - "192.168.1.20:9100"      # example LXC/VM with node_exporter
  labels:
    host: app1
    role: service
    site: homelab
- targets:
    - "10.0.0.5:9100"          # Hetzner VPS
  labels:
    host: vps1
    role: edge
    site: hetzner
