# ============================================================================
# Argus AGENT — runs on EVERY monitored host (homelab hosts, PVE host, VPS).
# Exposes node_exporter (host metrics, incl. textfile collectors) + cAdvisor.
# Point the central Prometheus's targets/*.yml at these host:port endpoints.
#
#   cp .env.agent.example .env   # set TEXTFILE_DIR if you use collectors
#   docker compose -f docker-compose.agent.yml up -d
# ============================================================================
name: argus-agent

services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    network_mode: host                 # so it reports the host's real IP/metrics
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.textfile.directory=/host/var/lib/node_exporter/textfile
      - --collector.systemd
      - --collector.processes
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  # Phase 2: ship host + container logs to the central Loki.
  # Set LOKI_URL (central Loki) and HOSTNAME in .env (see .env.agent.example).
  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      LOKI_URL: ${LOKI_URL:-http://loki.lan:3100}
      HOSTNAME: ${AGENT_HOSTNAME:-${HOSTNAME}}
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
