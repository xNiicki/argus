# ============================================================================
# Promtail — ships host + container logs to the central Loki.
# Set LOKI_URL and HOSTNAME in the agent .env (see docker-compose.agent.yml).
# ============================================================================
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL:-http://loki.lan:3100}/loki/api/v1/push

scrape_configs:
  # --- systemd journal (system + kernel) ----------------------------------
  - job_name: journal
    journal:
      path: /var/log/journal
      max_age: 12h
      labels:
        job: journal
        host: ${HOSTNAME:-unknown}
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal__hostname']
        target_label: host
      - source_labels: ['__journal_syslog_identifier']
        target_label: syslog_id

  # --- docker containers ---------------------------------------------------
  - job_name: containers
    static_configs:
      - targets: [localhost]
        labels:
          job: containers
          host: ${HOSTNAME:-unknown}
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            tag: attrs.tag
      - regex:
          source: tag
          expression: '(?P<container>[^|]+)'
      - labels:
          container:
          stream:
      - output:
          source: output

  # --- plain /var/log files (fallback for non-journal hosts) --------------
  - job_name: varlogs
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          host: ${HOSTNAME:-unknown}
          __path__: /var/log/*.log
