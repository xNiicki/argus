# ============================================================================
# Argus — self-contained stack. Every config is baked into the images; the only
# thing a deployer provides is environment (copy .env.example -> .env, fill in,
# `docker compose up -d`). No config files to edit, no bind mounts.
#
#   - WHAT to monitor  -> ARGUS_*_TARGETS in .env (rendered at startup)
#   - WHERE to alert   -> NTFY_* in .env
#   - Proxmox          -> PVE_* in .env
# ============================================================================
name: argus

x-restart: &restart
  restart: unless-stopped

networks:
  argus:

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:

services:
  prometheus:
    <<: *restart
    image: ghcr.io/xniicki/argus-prometheus:${ARGUS_TAG:-latest}
    environment:
      ARGUS_SITE: ${ARGUS_SITE:-argus}
      # WHAT to monitor — comma-separated, optional name= and !insecure (see .env.example)
      ARGUS_NODE_TARGETS: ${ARGUS_NODE_TARGETS:-}
      ARGUS_CADVISOR_TARGETS: ${ARGUS_CADVISOR_TARGETS:-}
      ARGUS_HTTP_TARGETS: ${ARGUS_HTTP_TARGETS:-}
      ARGUS_TCP_TARGETS: ${ARGUS_TCP_TARGETS:-}
      ARGUS_ICMP_TARGETS: ${ARGUS_ICMP_TARGETS:-}
      ARGUS_SSL_TARGETS: ${ARGUS_SSL_TARGETS:-}
      ARGUS_DNS_TARGETS: ${ARGUS_DNS_TARGETS:-}
      ARGUS_PVE_TARGET: ${ARGUS_PVE_TARGET:-}
      ARGUS_PVE_CLUSTER: ${ARGUS_PVE_CLUSTER:-pve}
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [argus]

  alertmanager:
    <<: *restart
    image: ghcr.io/xniicki/argus-alertmanager:${ARGUS_TAG:-latest}
    volumes:
      - alertmanager_data:/alertmanager
    networks: [argus]

  blackbox:
    <<: *restart
    image: ghcr.io/xniicki/argus-blackbox:${ARGUS_TAG:-latest}
    cap_add: [NET_RAW]            # ICMP probes need raw sockets
    networks: [argus]

  pve-exporter:
    <<: *restart
    image: prompve/prometheus-pve-exporter:3.4.4
    environment:
      PVE_USER: ${PVE_USER:-argus@pve}
      PVE_TOKEN_NAME: ${PVE_TOKEN_NAME:-monitoring}
      PVE_TOKEN_VALUE: ${PVE_TOKEN_VALUE:-}
      PVE_VERIFY_SSL: ${PVE_VERIFY_SSL:-false}
    networks: [argus]

  loki:
    <<: *restart
    image: ghcr.io/xniicki/argus-loki:${ARGUS_TAG:-latest}
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - loki_data:/loki
    networks: [argus]

  narrator:
    <<: *restart
    image: ghcr.io/xniicki/argus-narrator:${ARGUS_TAG:-latest}
    environment:
      ARGUS_SITE: ${ARGUS_SITE:-argus}
      ARGUS_EXTERNAL_URL: ${ARGUS_EXTERNAL_URL:-http://localhost:8088}
      PROMETHEUS_URL: http://prometheus:9090
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:-argus}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      PEER_NARRATOR_URL: ${PEER_NARRATOR_URL:-}
      PEER_SITE: ${PEER_SITE:-}
      WATCHDOG_DEADLINE_SECONDS: ${WATCHDOG_DEADLINE_SECONDS:-180}
      NARRATOR_LOG_LEVEL: ${NARRATOR_LOG_LEVEL:-INFO}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_ENABLED: ${LLM_ENABLED:-true}
    ports:
      - "${NARRATOR_PORT:-8088}:8088"
    depends_on: [prometheus, loki]
    networks: [argus]
